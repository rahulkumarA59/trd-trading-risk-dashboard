# Server Configuration
server.port=8083

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/trd?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=TRDJwtSecretKeyForTradingAndRiskDashboardApplication2024SecureToken
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false
# spring.data.redis.password=${REDIS_PASSWORD}
# Local development defaults to in-memory caching so Redis is optional.
# Set TRD_CACHE_TYPE=redis when you want to use Redis.
spring.cache.type=${TRD_CACHE_TYPE:simple}
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true

# Stock API Configuration (Alpha Vantage)
# Replace the demo fallback with your real Alpha Vantage API key.
# The demo key only returns sample data for IBM.
stock.api.key=${ALPHA_VANTAGE_API_KEY:demo}
stock.api.base-url=https://www.alphavantage.co/query
stock.api.timeout=5000
stock.scheduler.fixed-rate=60000
stock.scheduler.initial-delay=10000
stock.bootstrap.enabled=true

# Python ML Prediction Integration
prediction.python.command=python
prediction.python.script=predict.py
prediction.python.timeout-seconds=${PREDICTION_PYTHON_TIMEOUT_SECONDS:15}

# Logging
logging.level.root=INFO
logging.level.com.trd=DEBUG
logging.level.com.trd.scheduler=INFO
